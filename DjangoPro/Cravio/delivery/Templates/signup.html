{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create account · Cravio</title>
  <link rel="stylesheet" href="{% static 'style.css' %}" />
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card" style="max-width:500px">
      <div class="auth-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2C8 2 4 5 4 9c0 5.25 8 13 8 13s8-7.75 8-13c0-4-4-7-8-7z"/>
          <circle cx="12" cy="9" r="2.5" fill="#ffffff" stroke="none"/>
        </svg>
      </div>
      <h1 class="auth-title">Create your account</h1>
      <p class="auth-sub">One account to discover restaurants, track orders, and save your favourites.</p>

      <form action="{% url 'signup' %}" method="POST" class="form-stack">
        {% csrf_token %}
        <div class="field-row">
          <div class="field">
            <label class="field-label">Username</label>
            <input type="text" name="username" class="field-input" placeholder="Choose a username" required autofocus />
          </div>
          <div class="field">
            <label class="field-label">Password</label>
            <input type="password" name="password" class="field-input" placeholder="Create a password" required />
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label class="field-label">Email</label>
            <input type="email" name="email" class="field-input" placeholder="you@example.com" required />
          </div>
          <div class="field">
            <label class="field-label">Mobile</label>
            <input type="text" name="mobile" class="field-input" placeholder="+91 98765 43210" required />
          </div>
        </div>
        <div class="field">
          <label class="field-label">Delivery address</label>
          <textarea name="address" class="field-textarea" placeholder="Door no / Street · Landmark · City · PIN" required></textarea>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn-primary btn-block">Create account</button>
          <p class="form-hint">Already have an account? <a href="{% url 'open_signin' %}">Sign in</a></p>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
