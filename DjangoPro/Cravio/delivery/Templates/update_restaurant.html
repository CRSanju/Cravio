{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Update Restaurant · Cravio</title>
  <link rel="stylesheet" href="{% static 'style.css' %}" />
</head>
<body>

  <div class="nav-wrap">
    <nav class="nav">
      <div class="nav-brand">
        <div class="nav-logo-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2C8 2 4 5 4 9c0 5.25 8 13 8 13s8-7.75 8-13c0-4-4-7-8-7z"/>
            <circle cx="12" cy="9" r="2.5" fill="#ffffff" stroke="none"/>
          </svg>
        </div>
        <div>
          <div class="nav-wordmark">Cravio</div>
          <div class="nav-tagline">Admin console</div>
        </div>
      </div>
      <div class="nav-right">
        <a href="open_show_restaurant" class="btn-secondary btn-sm">← All restaurants</a>
      </div>
    </nav>
  </div>

  <div class="auth-wrap">
    <div class="auth-card" style="max-width:480px">
      <div class="auth-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
        </svg>
      </div>
      <h1 class="auth-title">Update restaurant</h1>
      <p class="auth-sub">Keep information accurate so customers always see the right experience.</p>

      <form action="{% url 'update_restaurant' restaurant.id %}" method="post" class="form-stack">
        {% csrf_token %}
        <div class="field">
          <label class="field-label">Restaurant name</label>
          <input type="text" name="name" value="{{ restaurant.name }}" class="field-input" required />
        </div>
        <div class="field">
          <label class="field-label">Picture URL</label>
          <input type="url" name="picture" value="{{ restaurant.picture }}" class="field-input" />
        </div>
        <div class="field-row">
          <div class="field">
            <label class="field-label">Cuisine</label>
            <input type="text" name="cuisine" value="{{ restaurant.cuisine }}" class="field-input" />
          </div>
          <div class="field">
            <label class="field-label">Rating</label>
            <input type="number" name="rating" min="0" max="5" step="0.5" value="{{ restaurant.rating }}" class="field-input" />
          </div>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn-primary btn-block">Save changes</button>
        </div>
      </form>
    </div>
  </div>

</body>
</html>
