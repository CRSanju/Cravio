{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign-in failed · Cravio</title>
  <link rel="stylesheet" href="{% static 'style.css' %}" />
</head>
<body>
  <div class="fail-wrap">
    <div class="fail-card">
      <div class="fail-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
      </div>
      <div class="fail-label">Something went wrong</div>
      <h1 class="fail-title">Sign-in failed</h1>
      <p class="fail-body">
        We couldn't sign you in with those details. Please check your username
        and password and try again.
      </p>
      <div class="fail-actions">
        <a href="{% url 'open_signin' %}" class="btn-primary">Try again</a>
        <a href="{% url 'open_signup' %}" class="btn-secondary">Create a new account</a>
      </div>
    </div>
  </div>
</body>
</html>
